plugins:
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Lint/MissingSuper:
  Enabled: false

Metrics/AbcSize:
  Max: 30
  Exclude:
    - "lib/hermitclaw/channels/webhook.rb"

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 15

Metrics/MethodLength:
  CountAsOne:
    - array
  Max: 40

Metrics/BlockLength:
  Exclude:
    - "test/**/*"
    - "Rakefile"

Minitest/MultipleAssertions:
  Max: 6
